<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#313244"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#89b4fa"/>
      <stop offset="1" stop-color="#a6e3a1"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- shield outline -->
  <path d="M64 16 L102 30 V62 C102 86 86 104 64 114 C42 104 26 86 26 62 V30 Z"
        fill="none" stroke="url(#accent)" stroke-width="4" stroke-linejoin="round"/>
  <!-- smile arc (Amazon cue) -->
  <path d="M40 74 Q64 96 88 74" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <!-- arrow tip -->
  <path d="M82 68 L92 74 L86 82" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- spark -->
  <circle cx="64" cy="46" r="4" fill="#f9e2af"/>
  <circle cx="48" cy="52" r="2" fill="#f9e2af"/>
  <circle cx="80" cy="52" r="2" fill="#f9e2af"/>
</svg>
