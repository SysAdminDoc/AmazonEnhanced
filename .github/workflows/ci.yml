name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in manifest.json defaults.json locales.json selectors.json; do
            echo "Checking $f..."
            python3 -c "import json; json.load(open('$f'))"
          done

      - name: Check manifest version matches
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "Manifest version: $VERSION"

      - name: Lint JS (syntax check)
        run: |
          for f in content.js background.js popup.js early-inject.js sidepanel.js; do
            echo "Checking $f..."
            node --check "$f"
          done

  build:
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          zip -r "dist/AmazonEnhanced-v${VERSION}.zip" \
            manifest.json defaults.json locales.json selectors.json \
            early-inject.js theme.css content.js background.js \
            popup.html popup.css popup.js \
            sidepanel.html sidepanel.js \
            icons/ _locales/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmazonEnhanced-v${{ steps.version.outputs.version }}
          path: dist/

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
